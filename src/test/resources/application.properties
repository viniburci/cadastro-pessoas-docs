# Datasource H2 para testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Desabilita Liquibase nos testes (SQL usa BIGSERIAL que e especifico do PostgreSQL)
spring.liquibase.enabled=false

# JWT
jwt.secret=test-secret-key-for-testing-purposes-only-must-be-at-least-256-bits-long-padding
jwt.expiration=86400000
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000

# OAuth2 Google - valores fictios para testes
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# App
app.oauth2.redirect-uri=http://localhost:4200/auth/callback

spring.profiles.active=test
